name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'Frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'Frontend/**'
      
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            Frontend/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('Frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install Dependencies
        working-directory: ./Frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: ./Frontend
        run: npm test
      - name: Clean Nuxt Build State
        working-directory: ./Frontend
        run: |
          rm -rf .nuxt .output
          rm -rf node_modules/.cache/nuxt
      - name: Build Application
        working-directory: ./Frontend
        run: npm run generate
        env:
          CI: true
          NUXT_TELEMETRY_DISABLED: 1
          NUXT_PUBLIC_API_BASE: ${{ secrets.NUXT_PUBLIC_API_BASE }}
      - name: Validate Static Output
        working-directory: ./Frontend
        run: |
          if grep -RInE '<moviecard|<moviemodal' .output/public; then
            echo "Found unresolved Vue components in generated static HTML."
            exit 1
          fi
      - name: Build And Deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DESERT_08300781E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          skip_app_build: true
          app_location: "/Frontend/.output/public" # App source code path


  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DESERT_08300781E }}
          action: "close"


